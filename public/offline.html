<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Samvaya Matrimony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 50%, #fecdd3 100%);
      color: #1a1a1a;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 400px;
    }
    .logo {
      font-size: 1.75rem;
      font-weight: 700;
      color: #be123c;
      letter-spacing: -0.025em;
      margin-bottom: 2rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      color: #9f1239;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #1a1a1a;
    }
    p {
      color: #6b7280;
      font-size: 0.9375rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #be123c;
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #9f1239; }
    .retry-btn:focus-visible { outline: 2px solid #be123c; outline-offset: 2px; }
    .retry-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Samvaya</div>
    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
    </svg>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Please check your Wi-Fi or mobile data and try again.
    </p>
    <button class="retry-btn" onclick="location.reload()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
      </svg>
      Try again
    </button>
  </div>
  <script>
    window.addEventListener('online', function() { location.reload(); });
  </script>
</body>
</html>
